name: Sync Upstream

on:
  schedule:
    - cron: "17 */6 * * *" # Every 6 hours at :17
  workflow_dispatch: # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: git remote add upstream https://github.com/TraderAlice/OpenAlice.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check for new commits
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/master)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          if [ "$BEHIND" -gt 0 ]; then
            echo "::notice::$BEHIND new commit(s) from upstream"
            git log --oneline HEAD..upstream/master
          else
            echo "::notice::Already up to date"
          fi

      - name: Merge upstream/master
        if: steps.check.outputs.behind != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge upstream/master --no-edit
          git push origin master
